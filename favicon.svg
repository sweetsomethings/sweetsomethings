<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#FDF6EC" stroke="#22395B" stroke-width="2"/>
  
  <!-- Cupcake base -->
  <path d="M 35 55 L 40 75 L 60 75 L 65 55 Z" fill="#E9C98F" stroke="#8A5A33" stroke-width="1.5"/>
  
  <!-- Cupcake wrapper ridges -->
  <line x1="40" y1="60" x2="38" y2="75" stroke="#8A5A33" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="55" x2="50" y2="75" stroke="#8A5A33" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="60" x2="62" y2="75" stroke="#8A5A33" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Frosting swirl -->
  <path d="M 35 55 Q 50 35 65 55" fill="#F2A0A6" stroke="#F2A0A6" stroke-width="2"/>
  <ellipse cx="50" cy="45" rx="16" ry="12" fill="#F2A0A6"/>
  
  <!-- Frosting texture (piping effect) -->
  <circle cx="45" cy="42" r="2" fill="#FAD8DA" opacity="0.8"/>
  <circle cx="50" cy="40" r="2" fill="#FAD8DA" opacity="0.8"/>
  <circle cx="55" cy="42" r="2" fill="#FAD8DA" opacity="0.8"/>
  
  <!-- Heart accent (Sweet Somethings branding) -->
  <path d="M 50 48 Q 47 45 45 45 Q 43 45 43 47 Q 43 50 50 56 Q 57 50 57 47 Q 57 45 55 45 Q 53 45 50 48" fill="#22395B" opacity="0.7"/>
